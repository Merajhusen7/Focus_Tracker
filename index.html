<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FocusTrack</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#0a0e1a; --surface:#131929; --surface2:#1a2238; --surface3:#202c42;
      --border:#253049; --mint:#00f5a0; --mint-dim:rgba(0,245,160,0.12);
      --mint-glow:rgba(0,245,160,0.35); --amber:#f5a623;
      --amber-dim:rgba(245,166,35,0.15); --amber-glow:rgba(245,166,35,0.3);
      --blue:#4f8ef7; --red:#ff5f6d; --text:#e8edf5;
      --muted:#8892a4; --faint:#3a4a62; --radius:14px; --radius-sm:8px;
    }
    html { scroll-behavior: smooth; }
    body { background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; min-height:100vh; }
    .app { max-width:900px; margin:0 auto; padding:28px 20px 60px; }

    /* HEADER */
    header { display:flex; align-items:center; justify-content:space-between; margin-bottom:28px; flex-wrap:wrap; gap:12px; }
    .logo { display:flex; align-items:center; gap:12px; }
    .logo-icon { width:40px; height:40px; background:var(--mint-dim); border:1.5px solid var(--mint); border-radius:10px; display:grid; place-items:center; font-size:20px; box-shadow:0 0 18px var(--mint-glow); }
    .logo h1 { font-family:'Space Grotesk',sans-serif; font-size:1.4rem; font-weight:700; letter-spacing:-0.5px; }
    .logo h1 span { color:var(--mint); }
    .header-right { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
    .date-pill { background:var(--surface); border:1px solid var(--border); border-radius:30px; padding:6px 16px; font-size:0.8rem; color:var(--muted); font-weight:500; }
    .nav-btn { display:flex; align-items:center; gap:7px; padding:7px 16px; background:var(--surface2); border:1px solid var(--border); border-radius:30px; color:var(--muted); font-size:0.8rem; font-weight:600; cursor:pointer; text-decoration:none; transition:all 0.15s; font-family:'Inter',sans-serif; }
    .nav-btn:hover { border-color:var(--mint); color:var(--mint); background:var(--mint-dim); }
    .nav-btn svg { width:14px; height:14px; stroke:currentColor; fill:none; }

    /* MAIN GRID */
    .main-grid { display:grid; grid-template-columns:260px 1fr; gap:20px; margin-bottom:24px; align-items:start; }
    @media (max-width:680px) { .main-grid { grid-template-columns:1fr; } }

    /* TIMER */
    .timer-panel { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:22px 18px 20px; display:flex; flex-direction:column; align-items:center; position:relative; overflow:hidden; }
    .timer-panel::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,var(--mint),var(--blue),transparent); }
    .timer-mode-row { display:flex; gap:6px; margin-bottom:18px; width:100%; }
    .mode-btn { flex:1; padding:6px 4px; background:var(--surface2); border:1px solid var(--border); color:var(--muted); border-radius:7px; font-family:'Space Grotesk',sans-serif; font-size:0.7rem; font-weight:600; letter-spacing:0.4px; cursor:pointer; transition:all 0.15s; }
    .mode-btn.active { background:var(--mint-dim); border-color:var(--mint); color:var(--mint); }
    .mode-btn:hover:not(.active) { color:var(--text); border-color:var(--faint); }
    .timer-ring-wrap { position:relative; width:160px; height:160px; margin:0 auto 18px; }
    .timer-svg { transform:rotate(-90deg); }
    .ring-bg { fill:none; stroke:var(--surface3); stroke-width:8; }
    .ring-prog { fill:none; stroke-width:8; stroke-linecap:round; stroke:var(--mint); transition:stroke-dashoffset 0.9s linear, stroke 0.4s; }
    .timer-ring-wrap.break .ring-prog { stroke:var(--amber); }
    .timer-display { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
    .timer-time { font-family:'Space Grotesk',sans-serif; font-size:2.4rem; font-weight:700; letter-spacing:-1px; line-height:1; transition:color 0.3s; }
    .timer-ring-wrap.break .timer-time { color:var(--amber); }
    .timer-sublabel { font-size:0.68rem; font-weight:600; letter-spacing:1.2px; text-transform:uppercase; color:var(--muted); margin-top:4px; }
    .timer-controls { display:flex; gap:10px; width:100%; }
    .timer-btn { flex:1; padding:10px 0; border-radius:9px; border:none; font-family:'Space Grotesk',sans-serif; font-size:0.85rem; font-weight:700; cursor:pointer; transition:all 0.15s; }
    .timer-btn-play { background:var(--mint); color:#0a0e1a; box-shadow:0 4px 16px var(--mint-glow); }
    .timer-btn-play:hover { background:#00dda0; transform:translateY(-1px); }
    .timer-btn-play.break-mode { background:var(--amber); box-shadow:0 4px 16px var(--amber-glow); }
    .timer-btn-play.break-mode:hover { background:#e09510; }
    .timer-btn-reset { background:var(--surface2); color:var(--muted); border:1px solid var(--border); flex:0 0 42px; padding:10px; }
    .timer-btn-reset:hover { color:var(--text); border-color:var(--faint); }
    .timer-session-count { margin-top:14px; font-size:0.72rem; color:var(--muted); display:flex; align-items:center; gap:6px; }
    .session-dots { display:flex; gap:4px; }
    .session-dot { width:7px; height:7px; border-radius:50%; background:var(--faint); transition:background 0.2s; }
    .session-dot.lit { background:var(--mint); box-shadow:0 0 6px var(--mint-glow); }
    .break-banner { display:none; width:100%; margin-top:12px; background:var(--amber-dim); border:1px solid rgba(245,166,35,0.3); border-radius:8px; padding:8px 12px; font-size:0.75rem; color:var(--amber); text-align:center; font-weight:600; }
    .break-banner.show { display:block; }

    /* SOUND CONTROLS */
    .sound-row { display:flex; align-items:center; gap:8px; width:100%; margin-top:12px; }
    .sound-toggle { background:none; border:none; cursor:pointer; color:var(--muted); font-size:1rem; padding:2px; transition:color 0.15s; flex-shrink:0; line-height:1; }
    .sound-toggle:hover { color:var(--text); }
    .sound-toggle.muted { color:var(--faint); }
    .vol-slider { flex:1; -webkit-appearance:none; appearance:none; height:4px; border-radius:4px; background:var(--faint); outline:none; cursor:pointer; }
    .vol-slider::-webkit-slider-thumb { -webkit-appearance:none; width:14px; height:14px; border-radius:50%; background:var(--mint); cursor:pointer; box-shadow:0 0 6px var(--mint-glow); }
    .vol-slider::-moz-range-thumb { width:14px; height:14px; border-radius:50%; background:var(--mint); cursor:pointer; border:none; }
    .sound-label { font-size:0.65rem; color:var(--faint); width:26px; text-align:right; flex-shrink:0; font-weight:600; }
    .sound-pick { display:flex; gap:4px; width:100%; margin-top:6px; }
    .sp-btn { flex:1; padding:5px 2px; background:var(--surface2); border:1px solid var(--border); color:var(--muted); border-radius:6px; font-size:0.62rem; font-weight:600; cursor:pointer; transition:all 0.12s; font-family:'Inter',sans-serif; }
    .sp-btn.active { background:var(--mint-dim); border-color:var(--mint); color:var(--mint); }
    .sp-btn:hover:not(.active) { color:var(--text); }

    /* TODAY */
    .today-panel { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:22px 22px 18px; position:relative; overflow:hidden; }
    .today-panel::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,transparent,var(--mint),var(--blue)); }
    .today-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; flex-wrap:wrap; gap:10px; }
    .today-label { font-family:'Space Grotesk',sans-serif; font-size:0.72rem; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--mint); }
    .today-stats { display:flex; gap:18px; }
    .stat { text-align:center; }
    .stat-val { font-family:'Space Grotesk',sans-serif; font-size:1.55rem; font-weight:700; line-height:1; }
    .stat-val span { color:var(--mint); font-size:0.9rem; }
    .stat-lbl { font-size:0.7rem; color:var(--muted); margin-top:3px; }
    .pomo-grid { display:flex; flex-wrap:wrap; gap:7px; align-items:center; min-height:42px; }
    .pomo-box { width:40px; height:40px; border-radius:9px; border:1.5px solid var(--border); background:var(--surface2); cursor:pointer; display:grid; place-items:center; transition:all 0.18s ease; position:relative; user-select:none; }
    .pomo-box:hover { border-color:var(--mint); background:var(--mint-dim); transform:scale(1.08); }
    .pomo-box.done { background:var(--mint-dim); border-color:var(--mint); box-shadow:0 0 10px var(--mint-glow); animation:popIn 0.25s ease forwards; }
    .pomo-box.done::after { content:'✓'; color:var(--mint); font-size:1.3rem; font-weight:700; }
    .pomo-box:not(.done)::after { content:''; width:9px; height:9px; border-radius:50%; background:var(--faint); }
    .today-footer { margin-top:14px; display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
    .btn { padding:8px 16px; border-radius:8px; border:none; font-family:'Inter',sans-serif; font-size:0.8rem; font-weight:600; cursor:pointer; transition:all 0.15s ease; }
    .btn-primary { background:var(--mint); color:#0a0e1a; }
    .btn-primary:hover { background:#00dda0; transform:translateY(-1px); }
    .btn-ghost { background:var(--surface2); color:var(--muted); border:1px solid var(--border); }
    .btn-ghost:hover { background:var(--surface3); color:var(--text); }
    .btn-danger { background:rgba(255,95,109,0.1); color:var(--red); border:1px solid rgba(255,95,109,0.25); }
    .btn-danger:hover { background:rgba(255,95,109,0.2); }

    /* TABS */
    .tabs-wrapper { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; }
    .tab-nav { display:flex; border-bottom:1px solid var(--border); }
    .tab-btn { flex:1; padding:13px 12px; background:transparent; border:none; color:var(--muted); font-family:'Space Grotesk',sans-serif; font-size:0.85rem; font-weight:600; letter-spacing:0.5px; cursor:pointer; transition:all 0.15s ease; position:relative; }
    .tab-btn.active { color:var(--mint); background:var(--mint-dim); }
    .tab-btn.active::after { content:''; position:absolute; bottom:-1px; left:0; right:0; height:2px; background:var(--mint); }
    .tab-btn:hover:not(.active) { color:var(--text); background:var(--surface2); }
    .tab-content { display:none; padding:22px; }
    .tab-content.active { display:block; }

    /* WEEK */
    .week-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:7px; margin-bottom:20px; }
    .week-day { background:var(--surface2); border:1px solid var(--border); border-radius:var(--radius-sm); padding:11px 6px; text-align:center; }
    .week-day.today-col { border-color:var(--mint); background:var(--mint-dim); }
    .week-day-name { font-size:0.68rem; font-weight:600; letter-spacing:1px; text-transform:uppercase; color:var(--muted); margin-bottom:5px; }
    .week-day.today-col .week-day-name { color:var(--mint); }
    .week-day-num { font-family:'Space Grotesk',sans-serif; font-size:1.05rem; font-weight:700; margin-bottom:7px; }
    .week-pomo-count { font-family:'Space Grotesk',sans-serif; font-size:1.35rem; font-weight:700; color:var(--mint); line-height:1; }
    .week-pomo-label { font-size:0.62rem; color:var(--muted); margin-top:2px; }
    .week-bar-wrap { margin-top:7px; height:3px; background:var(--faint); border-radius:4px; overflow:hidden; }
    .week-bar-fill { height:100%; background:linear-gradient(90deg,var(--mint),var(--blue)); border-radius:4px; transition:width 0.4s ease; }
    .week-summary { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
    .summary-card { background:var(--surface2); border:1px solid var(--border); border-radius:var(--radius-sm); padding:14px; text-align:center; }
    .summary-card-val { font-family:'Space Grotesk',sans-serif; font-size:1.7rem; font-weight:700; }
    .summary-card-val.mint { color:var(--mint); }
    .summary-card-val.amber { color:var(--amber); }
    .summary-card-val.blue { color:var(--blue); }
    .summary-card-lbl { font-size:0.7rem; color:var(--muted); margin-top:4px; }

    /* MONTH */
    .month-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
    .month-nav { display:flex; align-items:center; gap:10px; }
    .month-nav button { background:var(--surface2); border:1px solid var(--border); color:var(--muted); width:30px; height:30px; border-radius:7px; cursor:pointer; font-size:1rem; transition:all 0.15s; display:grid; place-items:center; }
    .month-nav button:hover { color:var(--text); border-color:var(--mint); }
    .month-title { font-family:'Space Grotesk',sans-serif; font-size:1.05rem; font-weight:700; }
    .month-cal-head { display:grid; grid-template-columns:repeat(7,1fr); gap:3px; margin-bottom:4px; }
    .cal-head-cell { text-align:center; font-size:0.65rem; font-weight:600; letter-spacing:1px; text-transform:uppercase; color:var(--muted); padding:3px 0; }
    .month-cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:3px; }
    .cal-cell { aspect-ratio:1; background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:4px; position:relative; display:flex; flex-direction:column; align-items:center; overflow:hidden; font-size:0.72rem; }
    .cal-cell.empty { background:transparent; border-color:transparent; }
    .cal-cell.today-cell { border-color:var(--mint); }
    .cal-cell.has-sessions { background:var(--surface3); }
    .cal-day-num { font-weight:600; color:var(--muted); font-size:0.68rem; align-self:flex-start; line-height:1; }
    .cal-cell.today-cell .cal-day-num { color:var(--mint); }
    .cal-pomo-num { font-family:'Space Grotesk',sans-serif; font-size:0.95rem; font-weight:700; color:var(--mint); margin-top:auto; }
    .cal-pomo-num.zero { color:var(--faint); }
    .cal-heat-bar { position:absolute; bottom:0; left:0; right:0; height:3px; }
    .month-stats { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-top:16px; }

    /* YEAR */
    .year-nav { display:flex; align-items:center; justify-content:space-between; margin-bottom:18px; }
    .year-title { font-family:'Space Grotesk',sans-serif; font-size:1.05rem; font-weight:700; }
    .year-months { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
    .year-month-card { background:var(--surface2); border:1px solid var(--border); border-radius:var(--radius-sm); padding:13px; }
    .year-month-card.current-month { border-color:var(--mint); }
    .year-month-name { font-family:'Space Grotesk',sans-serif; font-size:0.78rem; font-weight:600; color:var(--muted); margin-bottom:9px; }
    .year-month-card.current-month .year-month-name { color:var(--mint); }
    .year-mini-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:2px; }
    .year-mini-cell { aspect-ratio:1; border-radius:2px; background:var(--faint); }
    .year-mini-cell.lvl1 { background:rgba(0,245,160,0.25); }
    .year-mini-cell.lvl2 { background:rgba(0,245,160,0.5); }
    .year-mini-cell.lvl3 { background:rgba(0,245,160,0.75); }
    .year-mini-cell.lvl4 { background:var(--mint); }
    .year-mini-cell.empty-cell { background:transparent; }
    .year-month-total { margin-top:7px; font-family:'Space Grotesk',sans-serif; font-size:0.95rem; font-weight:700; }
    .year-month-total span { color:var(--mint); }
    .year-month-mins { font-size:0.7rem; color:var(--muted); margin-top:2px; }
    .year-summary { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:18px; }
    .legend { display:flex; align-items:center; gap:6px; margin-top:10px; font-size:0.7rem; color:var(--muted); flex-wrap:wrap; }
    .legend-swatch { width:11px; height:11px; border-radius:2px; }
    .section-label { font-family:'Space Grotesk',sans-serif; font-size:0.68rem; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--muted); margin-bottom:12px; }

    /* TOAST */
    #toast { position:fixed; bottom:28px; left:50%; transform:translateX(-50%) translateY(80px); background:var(--surface3); border:1px solid var(--mint); color:var(--mint); padding:10px 22px; border-radius:30px; font-size:0.82rem; font-weight:600; transition:transform 0.3s ease; z-index:999; white-space:nowrap; box-shadow:0 4px 24px rgba(0,0,0,0.4); }
    #toast.show { transform:translateX(-50%) translateY(0); }
    #toast.amber-toast { border-color:var(--amber); color:var(--amber); }

    /* ANIMATIONS */
    @keyframes popIn { 0%{transform:scale(0.7);opacity:0;} 70%{transform:scale(1.12);} 100%{transform:scale(1);opacity:1;} }
    @keyframes ringPulse { 0%,100%{filter:drop-shadow(0 0 6px var(--mint-glow));} 50%{filter:drop-shadow(0 0 14px var(--mint-glow));} }
    .ring-prog.running { animation:ringPulse 2s ease-in-out infinite; }

    @media (max-width:600px) {
      .week-grid { grid-template-columns:repeat(4,1fr); }
      .month-stats { grid-template-columns:repeat(2,1fr); }
      .year-months { grid-template-columns:repeat(2,1fr); }
      .year-summary { grid-template-columns:repeat(2,1fr); }
      .week-summary { grid-template-columns:1fr; }
    }
    @media (max-width:400px) {
      .week-grid { grid-template-columns:repeat(3,1fr); }
      .year-months { grid-template-columns:1fr; }
    }
  </style>
</head>
<body>
<div class="app">

  <header>
    <div class="logo">
      <div class="logo-icon">🎯</div>
      <h1>Focus<span>Track</span></h1>
    </div>
    <div class="header-right">
      <div class="date-pill" id="headerDate"></div>
      <a href="analytics.html" class="nav-btn">
        <svg viewBox="0 0 24 24" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        Productivity Insights
      </a>
    </div>
  </header>

  <div class="main-grid">
    <!-- TIMER -->
    <div class="timer-panel">
      <div class="timer-mode-row">
        <button class="mode-btn active" id="modeWork" onclick="setMode('work')">Focus 25m</button>
        <button class="mode-btn" id="modeShort" onclick="setMode('short')">Break 5m</button>
        <button class="mode-btn" id="modeLong" onclick="setMode('long')">Long 15m</button>
      </div>
      <div class="timer-ring-wrap" id="timerRingWrap">
        <svg class="timer-svg" width="160" height="160" viewBox="0 0 160 160">
          <circle class="ring-bg" cx="80" cy="80" r="68"/>
          <circle class="ring-prog" id="ringProg" cx="80" cy="80" r="68" stroke-dasharray="427.26" stroke-dashoffset="0"/>
        </svg>
        <div class="timer-display">
          <div class="timer-time" id="timerTime">25:00</div>
          <div class="timer-sublabel" id="timerSublabel">READY</div>
        </div>
      </div>
      <div class="timer-controls">
        <button class="timer-btn timer-btn-play" id="timerPlayBtn" onclick="toggleTimer()">▶ Start</button>
        <button class="timer-btn timer-btn-reset" onclick="resetTimer()" title="Reset">↺</button>
      </div>
      <div class="timer-session-count">
        <span>Today:</span>
        <div class="session-dots" id="sessionDots"></div>
        <span id="sessionCountLabel">0 done</span>
      </div>
      <div class="break-banner" id="breakBanner">☕ Nice work! Take a breather.</div>

      <!-- SOUND CONTROLS -->
      <div class="sound-row">
        <button class="sound-toggle" id="soundToggle" onclick="toggleMute()" title="Mute/unmute">🔔</button>
        <input class="vol-slider" id="volSlider" type="range" min="0" max="100" value="80" oninput="setVolume(this.value)" />
        <span class="sound-label" id="volLabel">80</span>
      </div>
      <div class="sound-pick">
        <button class="sp-btn active" onclick="setSound('bell',this)">Bell</button>
        <button class="sp-btn" onclick="setSound('digital',this)">Digital</button>
        <button class="sp-btn" onclick="setSound('gentle',this)">Gentle</button>
        <button class="sp-btn" onclick="previewSound()">▶ Test</button>
      </div>
    </div>

    <!-- TODAY -->
    <div class="today-panel">
      <div class="today-header">
        <span class="today-label">📋 Today's Log</span>
        <div class="today-stats">
          <div class="stat"><div class="stat-val" id="statPomos">0</div><div class="stat-lbl">Sessions</div></div>
          <div class="stat"><div class="stat-val" id="statMins">0<span>m</span></div><div class="stat-lbl">Focused</div></div>
        </div>
      </div>
      <div class="pomo-grid" id="pomoGrid"></div>
      <div class="today-footer">
        <button class="btn btn-primary" onclick="addPomodoro()">＋ Manual add</button>
        <button class="btn btn-ghost" onclick="undoLast()">↩ Undo</button>
        <button class="btn btn-danger" onclick="clearToday()">✕ Reset</button>
      </div>
    </div>
  </div>

  <!-- TABS -->
  <div class="tabs-wrapper">
    <div class="tab-nav">
      <button class="tab-btn active" onclick="switchTab('week',this)">Week</button>
      <button class="tab-btn" onclick="switchTab('month',this)">Month</button>
      <button class="tab-btn" onclick="switchTab('year',this)">Year</button>
    </div>
    <div class="tab-content active" id="tab-week">
      <div class="section-label">This Week</div>
      <div class="week-grid" id="weekGrid"></div>
      <div class="section-label" style="margin-top:18px">Summary</div>
      <div class="week-summary" id="weekSummary"></div>
    </div>
    <div class="tab-content" id="tab-month">
      <div class="month-header">
        <div class="month-nav">
          <button onclick="changeMonth(-1)">‹</button>
          <span class="month-title" id="monthTitle"></span>
          <button onclick="changeMonth(1)">›</button>
        </div>
      </div>
      <div class="month-cal-head" id="monthCalHead"></div>
      <div class="month-cal-grid" id="monthCalGrid"></div>
      <div class="month-stats" id="monthStats"></div>
    </div>
    <div class="tab-content" id="tab-year">
      <div class="year-nav">
        <button class="btn btn-ghost" style="padding:6px 14px" onclick="changeYear(-1)">‹ Prev</button>
        <span class="year-title" id="yearTitle"></span>
        <button class="btn btn-ghost" style="padding:6px 14px" onclick="changeYear(1)">Next ›</button>
      </div>
      <div class="legend">
        <span>Less</span>
        <span class="legend-swatch" style="background:var(--faint)"></span>
        <span class="legend-swatch" style="background:rgba(0,245,160,0.25)"></span>
        <span class="legend-swatch" style="background:rgba(0,245,160,0.5)"></span>
        <span class="legend-swatch" style="background:rgba(0,245,160,0.75)"></span>
        <span class="legend-swatch" style="background:var(--mint)"></span>
        <span>More</span>
      </div>
      <div class="year-months" id="yearMonths" style="margin-top:14px"></div>
      <div class="year-summary" id="yearSummary"></div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── STORAGE ──────────────────────────────────────
const KEY      = 'focustrack_v1';
const TS_KEY   = 'focustrack_ts'; // timestamp log

function loadData()     { try { return JSON.parse(localStorage.getItem(KEY))    || {}; } catch { return {}; } }
function loadTS()       { try { return JSON.parse(localStorage.getItem(TS_KEY)) || []; } catch { return []; } }
function saveData(d)    { localStorage.setItem(KEY,    JSON.stringify(d)); }
function saveTS(arr)    { localStorage.setItem(TS_KEY, JSON.stringify(arr)); }
function dateKey(d)     { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function todayKey()     { return dateKey(new Date()); }
function getPomos(k)    { return loadData()[k] || 0; }
function setPomos(k, n) { const d=loadData(); if(n<=0) delete d[k]; else d[k]=n; saveData(d); }

// Log a timestamped session (ISO string)
function logTimestamp() {
  const arr = loadTS();
  arr.push(new Date().toISOString());
  saveTS(arr);
}

// ── AUDIO ENGINE ─────────────────────────────────
let audioCtx = null;
let soundMuted = false;
let soundVolume = 0.8;
let soundType = 'bell'; // bell | digital | gentle

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

// Smooth envelope helper
function makeEnv(ctx, gainNode, vol, attack, sustain, release) {
  const now = ctx.currentTime;
  gainNode.gain.setValueAtTime(0, now);
  gainNode.gain.linearRampToValueAtTime(vol, now + attack);
  gainNode.gain.setValueAtTime(vol, now + attack + sustain);
  gainNode.gain.exponentialRampToValueAtTime(0.0001, now + attack + sustain + release);
}

function playBell() {
  // Rich church-bell: fundamental + harmonics with natural decay
  const ctx = getAudioCtx();
  const freqs = [523.25, 1046.5, 1568, 2093]; // C5, C6, G6, C7
  const vols  = [0.5,    0.25,   0.15,  0.08];
  freqs.forEach((freq, i) => {
    const osc  = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq, ctx.currentTime);
    // slight pitch drop for bell character
    osc.frequency.exponentialRampToValueAtTime(freq * 0.98, ctx.currentTime + 1.5);
    makeEnv(ctx, gain, vols[i] * soundVolume, 0.005, 0.05, 2.5);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 3);
  });
  // Ring it 3 times
  [0, 0.8, 1.6].forEach(delay => {
    setTimeout(() => { if(!soundMuted) playBellOnce(); }, delay * 1000);
  });
}
function playBellOnce() {
  const ctx = getAudioCtx();
  const freqs = [523.25, 1046.5, 1568, 2093];
  const vols  = [0.5,    0.25,   0.15,  0.08];
  freqs.forEach((freq, i) => {
    const osc  = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(freq * 0.98, ctx.currentTime + 1.2);
    makeEnv(ctx, gain, vols[i] * soundVolume, 0.005, 0.05, 1.8);
    osc.start(); osc.stop(ctx.currentTime + 2);
  });
}

function playDigital() {
  // Three short beeps like a microwave/alarm
  [0, 0.28, 0.56].forEach(delay => {
    setTimeout(() => {
      if (soundMuted) return;
      const ctx = getAudioCtx();
      [880, 1100].forEach((freq, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.type = 'square';
        osc.frequency.value = freq;
        makeEnv(ctx, gain, (i === 0 ? 0.18 : 0.1) * soundVolume, 0.01, 0.15, 0.06);
        osc.start(); osc.stop(ctx.currentTime + 0.25);
      });
    }, delay * 1000);
  });
}

function playGentle() {
  // Soft ascending chime — like a meditation bowl
  const ctx = getAudioCtx();
  const notes = [392, 523.25, 659.25, 783.99]; // G4, C5, E5, G5 — major chord ascent
  notes.forEach((freq, i) => {
    const t = ctx.currentTime + i * 0.18;
    const osc  = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq, t);
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(0.3 * soundVolume, t + 0.03);
    gain.gain.exponentialRampToValueAtTime(0.0001, t + 1.8);
    osc.start(t); osc.stop(t + 2);
  });
}

function playAlarm() {
  if (soundMuted) return;
  // Resume context if suspended (browser autoplay policy)
  const ctx = getAudioCtx();
  if (ctx.state === 'suspended') ctx.resume();
  if      (soundType === 'bell')    playBell();
  else if (soundType === 'digital') playDigital();
  else                               playGentle();
}

function playBreakEnd() {
  if (soundMuted) return;
  const ctx = getAudioCtx();
  if (ctx.state === 'suspended') ctx.resume();
  // Single soft ding for break-end
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain); gain.connect(ctx.destination);
  osc.type = 'sine';
  osc.frequency.value = 440;
  makeEnv(ctx, gain, 0.25 * soundVolume, 0.01, 0.05, 1.0);
  osc.start(); osc.stop(ctx.currentTime + 1.2);
}

function toggleMute() {
  soundMuted = !soundMuted;
  const btn = document.getElementById('soundToggle');
  btn.textContent = soundMuted ? '🔕' : '🔔';
  btn.classList.toggle('muted', soundMuted);
  document.getElementById('volSlider').disabled = soundMuted;
}
function setVolume(val) {
  soundVolume = val / 100;
  document.getElementById('volLabel').textContent = val;
}
function setSound(type, btn) {
  soundType = type;
  document.querySelectorAll('.sp-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}
function previewSound() {
  // Unlock AudioContext on user gesture, then play
  const ctx = getAudioCtx();
  if (ctx.state === 'suspended') ctx.resume().then(playAlarm); else playAlarm();
}

// ── TIMER ─────────────────────────────────────────
const MODES = { work:25*60, short:5*60, long:15*60 };
let timerMode='work', timerTotal=MODES.work, timerLeft=MODES.work;
let timerRunning=false, timerInterval=null;
const CIRC = 2*Math.PI*68;

function setMode(mode) {
  if (timerRunning) return;
  timerMode=mode; timerTotal=MODES[mode]; timerLeft=timerTotal;
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('mode'+mode[0].toUpperCase()+mode.slice(1)).classList.add('active');
  document.getElementById('timerRingWrap').classList.toggle('break', mode!=='work');
  document.getElementById('timerPlayBtn').classList.toggle('break-mode', mode!=='work');
  document.getElementById('breakBanner').classList.remove('show');
  updateTimerDisplay();
}
function toggleTimer() { timerRunning ? pauseTimer() : startTimer(); }
function startTimer() {
  if (timerLeft<=0) resetTimer();
  // Unlock AudioContext on first user gesture
  try { const c=getAudioCtx(); if(c.state==='suspended') c.resume(); } catch(e){}
  timerRunning=true;
  document.getElementById('timerPlayBtn').textContent='⏸ Pause';
  document.getElementById('timerSublabel').textContent=timerMode==='work'?'FOCUSING':'BREAK';
  document.getElementById('ringProg').classList.add('running');
  timerInterval=setInterval(tickTimer,1000);
}
function pauseTimer() {
  timerRunning=false; clearInterval(timerInterval);
  document.getElementById('timerPlayBtn').textContent='▶ Resume';
  document.getElementById('timerSublabel').textContent='PAUSED';
  document.getElementById('ringProg').classList.remove('running');
}
function resetTimer() {
  timerRunning=false; clearInterval(timerInterval); timerLeft=timerTotal;
  document.getElementById('timerPlayBtn').textContent='▶ Start';
  document.getElementById('timerSublabel').textContent='READY';
  document.getElementById('ringProg').classList.remove('running');
  document.getElementById('breakBanner').classList.remove('show');
  updateTimerDisplay();
}
function tickTimer() {
  timerLeft--;
  updateTimerDisplay();
  if (timerLeft<=0) { clearInterval(timerInterval); timerRunning=false; document.getElementById('ringProg').classList.remove('running'); onTimerComplete(); }
}
function onTimerComplete() {
  if (timerMode==='work') {
    const k=todayKey();
    setPomos(k, getPomos(k)+1);
    logTimestamp();                     // ← timestamp logged here
    renderToday(); renderCurrentTab(); updateSessionDots();
    document.getElementById('timerPlayBtn').textContent='▶ Start';
    document.getElementById('timerSublabel').textContent='DONE! 🎉';
    document.getElementById('breakBanner').classList.add('show');
    playAlarm();
    showToast('🎉 25 min done — session logged!');
    if ('Notification' in window && Notification.permission==='granted')
      new Notification('FocusTrack',{body:'Session complete! Take a break. ☕'});
  } else {
    playBreakEnd();
    document.getElementById('timerPlayBtn').textContent='▶ Start';
    document.getElementById('timerSublabel').textContent='BREAK DONE';
    showToast('Break over — back to work! 💪', true);
  }
  timerLeft=timerTotal; updateTimerDisplay();
}
function updateTimerDisplay() {
  const m=Math.floor(timerLeft/60), s=timerLeft%60;
  document.getElementById('timerTime').textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  document.getElementById('ringProg').style.strokeDashoffset = CIRC*(1-timerLeft/timerTotal);
}
function updateSessionDots() {
  const n=getPomos(todayKey()), dots=document.getElementById('sessionDots');
  const MAX=8; dots.innerHTML='';
  for(let i=0;i<Math.min(n,MAX);i++){const d=document.createElement('div');d.className='session-dot lit';dots.appendChild(d);}
  const shown=Math.min(n,MAX), total=Math.max(shown,Math.ceil(shown/4)*4,4);
  for(let i=shown;i<total;i++){const d=document.createElement('div');d.className='session-dot';dots.appendChild(d);}
  document.getElementById('sessionCountLabel').textContent=`${n} done`;
}
function maybeRequestNotif() { if('Notification' in window && Notification.permission==='default') Notification.requestPermission(); }

// ── TODAY ─────────────────────────────────────────
function addPomodoro() {
  const k=todayKey(); setPomos(k,getPomos(k)+1);
  logTimestamp();
  renderToday(); renderCurrentTab(); updateSessionDots();
  showToast('✓ Session added!');
}
function undoLast() {
  const k=todayKey(), n=getPomos(k);
  if(n>0){
    setPomos(k,n-1);
    // remove last timestamp for today
    const arr=loadTS(), dk=todayKey();
    const idx=arr.map(t=>dateKey(new Date(t))).lastIndexOf(dk);
    if(idx>-1) arr.splice(idx,1);
    saveTS(arr);
    renderToday(); renderCurrentTab(); updateSessionDots();
    showToast('↩ Session removed');
  }
}
function clearToday() {
  if(!confirm("Clear all of today's sessions?")) return;
  setPomos(todayKey(),0);
  const arr=loadTS().filter(t=>dateKey(new Date(t))!==todayKey());
  saveTS(arr);
  renderToday(); renderCurrentTab(); updateSessionDots();
  showToast('✕ Today reset');
}
function togglePomo(idx) {
  const k=todayKey(), curr=getPomos(k);
  setPomos(k, curr>=idx+1 ? idx : idx+1);
  renderToday(); renderCurrentTab(); updateSessionDots();
}
function renderToday() {
  const k=todayKey(), n=getPomos(k), MAX=Math.max(n+4,8);
  document.getElementById('statPomos').textContent=n;
  document.getElementById('statMins').innerHTML=`${n*25}<span>m</span>`;
  const grid=document.getElementById('pomoGrid'); grid.innerHTML='';
  for(let i=0;i<MAX;i++){
    const box=document.createElement('div');
    box.className='pomo-box'+(i<n?' done':'');
    box.onclick=()=>togglePomo(i);
    grid.appendChild(box);
  }
}

// ── TABS ──────────────────────────────────────────
let activeTab='week';
function switchTab(tab,btn){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-'+tab).classList.add('active');
  activeTab=tab; renderCurrentTab();
}
function renderCurrentTab(){ if(activeTab==='week')renderWeek(); else if(activeTab==='month')renderMonth(); else renderYear(); }

// ── WEEK ──────────────────────────────────────────
function renderWeek(){
  const now=new Date(), monday=new Date(now);
  monday.setDate(now.getDate()-((now.getDay()+6)%7));
  const days=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  let total=0,best=0,activeDays=0; const counts=[];
  for(let i=0;i<7;i++){const d=new Date(monday);d.setDate(monday.getDate()+i);const n=getPomos(dateKey(d));counts.push(n);total+=n;if(n>best)best=n;if(n>0)activeDays++;}
  const grid=document.getElementById('weekGrid'); grid.innerHTML='';
  for(let i=0;i<7;i++){
    const d=new Date(monday);d.setDate(monday.getDate()+i);const n=counts[i];const isToday=dateKey(d)===todayKey();
    const cell=document.createElement('div');cell.className='week-day'+(isToday?' today-col':'');
    cell.innerHTML=`<div class="week-day-name">${days[i]}</div><div class="week-day-num">${d.getDate()}</div><div class="week-pomo-count">${n}</div><div class="week-pomo-label">sessions</div><div class="week-bar-wrap"><div class="week-bar-fill" style="width:${n>0?Math.max(8,(n/(best||1))*100):0}%"></div></div>`;
    grid.appendChild(cell);
  }
  document.getElementById('weekSummary').innerHTML=`
    <div class="summary-card"><div class="summary-card-val mint">${total}</div><div class="summary-card-lbl">Sessions this week</div></div>
    <div class="summary-card"><div class="summary-card-val amber">${Math.round(total*25/60*10)/10}h</div><div class="summary-card-lbl">Hours focused</div></div>
    <div class="summary-card"><div class="summary-card-val blue">${activeDays}/7</div><div class="summary-card-lbl">Active days</div></div>`;
}

// ── MONTH ─────────────────────────────────────────
let viewMonth=new Date(); viewMonth.setDate(1);
function changeMonth(dir){viewMonth.setMonth(viewMonth.getMonth()+dir);renderMonth();}
function renderMonth(){
  const y=viewMonth.getFullYear(),m=viewMonth.getMonth();
  document.getElementById('monthTitle').textContent=viewMonth.toLocaleString('default',{month:'long',year:'numeric'});
  document.getElementById('monthCalHead').innerHTML=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].map(d=>`<div class="cal-head-cell">${d}</div>`).join('');
  const daysInMonth=new Date(y,m+1,0).getDate(), startDow=(new Date(y,m,1).getDay()+6)%7, todayStr=todayKey();
  let total=0,best=0,activeDays=0,tempStreak=0; const counts={};
  for(let d=1;d<=daysInMonth;d++){const k=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;const n=getPomos(k);counts[k]=n;total+=n;if(n>best)best=n;if(n>0)activeDays++;}
  for(let d=daysInMonth;d>=1;d--){const k=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;if(new Date(y,m,d)>new Date())continue;if(counts[k]>0)tempStreak++;else break;}
  const grid=document.getElementById('monthCalGrid'); grid.innerHTML='';
  for(let i=0;i<startDow;i++)grid.innerHTML+=`<div class="cal-cell empty"></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const k=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;const n=counts[k];const isToday=k===todayStr;
    const pct=best>0?n/best:0;const heat=pct===0?'transparent':pct<0.33?'rgba(0,245,160,0.25)':pct<0.66?'rgba(0,245,160,0.55)':'rgba(0,245,160,0.85)';
    grid.innerHTML+=`<div class="cal-cell${isToday?' today-cell':''}${n>0?' has-sessions':''}"><span class="cal-day-num">${d}</span><span class="cal-pomo-num${n===0?' zero':''}">${n>0?n:'·'}</span><div class="cal-heat-bar" style="background:${heat}"></div></div>`;
  }
  document.getElementById('monthStats').innerHTML=`
    <div class="summary-card"><div class="summary-card-val mint">${total}</div><div class="summary-card-lbl">Total sessions</div></div>
    <div class="summary-card"><div class="summary-card-val amber">${Math.round(total*25/60*10)/10}h</div><div class="summary-card-lbl">Hours focused</div></div>
    <div class="summary-card"><div class="summary-card-val blue">${activeDays}</div><div class="summary-card-lbl">Active days</div></div>
    <div class="summary-card"><div class="summary-card-val" style="color:var(--amber)">${tempStreak} 🔥</div><div class="summary-card-lbl">Current streak</div></div>`;
}

// ── YEAR ──────────────────────────────────────────
let viewYear=new Date().getFullYear();
function changeYear(dir){viewYear+=dir;renderYear();}
function renderYear(){
  document.getElementById('yearTitle').textContent=viewYear;
  const nowDate=new Date(),MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  let yearTotal=0,yearActiveDays=0;
  const container=document.getElementById('yearMonths'); container.innerHTML='';
  for(let mo=0;mo<12;mo++){
    const daysInMo=new Date(viewYear,mo+1,0).getDate(),firstDow=(new Date(viewYear,mo,1).getDay()+6)%7;
    const isCur=(viewYear===nowDate.getFullYear()&&mo===nowDate.getMonth());
    let moTotal=0;const cells=[];
    for(let e=0;e<firstDow;e++)cells.push({empty:true});
    for(let d=1;d<=daysInMo;d++){const k=`${viewYear}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;const n=getPomos(k);moTotal+=n;if(n>0)yearActiveDays++;cells.push({n,k});}
    yearTotal+=moTotal;
    const maxInMo=cells.reduce((a,c)=>Math.max(a,c.n||0),0);
    const miniGrid=cells.map(c=>{if(c.empty)return`<div class="year-mini-cell empty-cell"></div>`;const pct=maxInMo>0?c.n/maxInMo:0;const lvl=c.n===0?'':pct<0.25?'lvl1':pct<0.5?'lvl2':pct<0.75?'lvl3':'lvl4';return`<div class="year-mini-cell ${lvl}" title="${c.k}: ${c.n}"></div>`;}).join('');
    const card=document.createElement('div');card.className=`year-month-card${isCur?' current-month':''}`;
    card.innerHTML=`<div class="year-month-name">${MONTHS[mo]}</div><div class="year-mini-grid">${miniGrid}</div><div class="year-month-total"><span>${moTotal}</span> sessions</div><div class="year-month-mins">${Math.round(moTotal*25/60*10)/10}h</div>`;
    container.appendChild(card);
  }
  document.getElementById('yearSummary').innerHTML=`
    <div class="summary-card"><div class="summary-card-val mint">${yearTotal}</div><div class="summary-card-lbl">Sessions in ${viewYear}</div></div>
    <div class="summary-card"><div class="summary-card-val amber">${Math.round(yearTotal*25/60*10)/10}h</div><div class="summary-card-lbl">Hours focused</div></div>
    <div class="summary-card"><div class="summary-card-val blue">${yearActiveDays}</div><div class="summary-card-lbl">Active days</div></div>`;
}

// ── TOAST ─────────────────────────────────────────
let toastTimer;
function showToast(msg,amber=false){
  const t=document.getElementById('toast');t.textContent=msg;
  t.className=amber?'amber-toast show':'show';
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>{t.classList.remove('show','amber-toast');},2800);
}

// ── INIT ──────────────────────────────────────────
(function init(){
  document.getElementById('headerDate').textContent=new Date().toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'});
  updateTimerDisplay(); renderToday(); updateSessionDots(); renderWeek();
  maybeRequestNotif();
  setInterval(()=>{document.getElementById('headerDate').textContent=new Date().toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'});},60000);
})();
</script>
</body>
